name: Mend CLI scan for Gradle

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * 0"

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  build:
    uses: project-ncl/shared-github-actions/.github/workflows/gradle-ci.yml@0fd979fcdd90cf1b62e6410221d64efd6b470865 # v0.0.21
    with:
      java_version: "17"
      gradle_version: "9.3.0"
      build_args: "--no-daemon clean build -x test -x funcTest"
      upload_artifacts: true

  call-mend-ci:
    needs: build
    uses: project-ncl/shared-github-actions/.github/workflows/mend-ci.yml@0fd979fcdd90cf1b62e6410221d64efd6b470865 # v0.0.21
    with:
      project_name: 'project-ncl/gradle-manipulator'
      SCA: true
      SAST: true
      SCA_EXCLUDES: "analyzer/src/functTest/**,manipulation/src/functTest/**"
      SAST_EXCLUDES: "analyzer/src/functTest/,manipulation/src/functTest/"
    secrets:
      MEND_URL: ${{ secrets.MEND_URL }}
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
      MEND_ORGNAME: ${{ secrets.MEND_ORGNAME }}
      MEND_PRODUCTNAME: ${{ secrets.MEND_PRODUCTNAME }}
